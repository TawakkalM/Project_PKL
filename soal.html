<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBGTK - Kuesioner Pola Pikir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bbgtk-blue': '#1e40af',
                        'bbgtk-light-blue': '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <div class="w-10 h-10 sm:w-12 sm:h-12 bg-bbgtk-blue rounded-lg flex items-center justify-center mr-2 sm:mr-3">
                            <span class="text-white font-bold text-xs sm:text-sm">BBGTK</span>
                        </div>
                        <div class="hidden sm:block">
                            <h1 class="text-lg font-semibold text-gray-900">BBGTK</h1>
                            <p class="text-sm text-gray-600">Sumatera Utara</p>
                        </div>
                    </div>
                </div>

                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="md:hidden p-2 rounded-md text-gray-700 hover:text-bbgtk-blue">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>

                <!-- Navigation -->
                <nav class="hidden md:flex space-x-8">
                    <a href="#" class="text-gray-700 hover:text-bbgtk-blue px-3 py-2 text-sm font-medium">Home</a>
                    <a href="#" class="text-gray-700 hover:text-bbgtk-blue px-3 py-2 text-sm font-medium">Panduan</a>
                    <a href="#" class="text-gray-700 hover:text-bbgtk-blue px-3 py-2 text-sm font-medium">Daftar Paket Soal</a>
                </nav>

                <!-- User Actions -->
                <div class="hidden md:flex items-center space-x-4">
                    <button class="p-2 rounded-full border-2 border-bbgtk-blue text-bbgtk-blue hover:bg-bbgtk-blue hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </button>
                    <button class="p-2 rounded-full border-2 border-bbgtk-blue text-bbgtk-blue hover:bg-bbgtk-blue hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Mobile Navigation Menu -->
            <div id="mobileMenu" class="hidden md:hidden pb-4">
                <div class="flex flex-col space-y-2">
                    <a href="#" class="text-gray-700 hover:text-bbgtk-blue px-3 py-2 text-sm font-medium">Home</a>
                    <a href="#" class="text-gray-700 hover:text-bbgtk-blue px-3 py-2 text-sm font-medium">Panduan</a>
                    <a href="#" class="text-gray-700 hover:text-bbgtk-blue px-3 py-2 text-sm font-medium">Daftar Paket Soal</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-8">
        <!-- Quiz Header -->
        <div class="bg-white rounded-lg shadow-sm p-4 sm:p-6 mb-4 sm:mb-8">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div class="flex items-center">
                    <button id="backBtn" class="mr-2 sm:mr-4 p-2 hover:bg-gray-100 rounded-full transition-colors">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <h2 class="text-lg sm:text-xl font-semibold text-gray-900 leading-tight">Kuesioner Pola Pikir untuk Kinerja dan Pembelajaran</h2>
                </div>
                <div class="flex items-center bg-bbgtk-blue text-white px-3 sm:px-4 py-2 rounded-full self-start sm:self-auto">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span id="timer" class="font-mono text-sm sm:text-base">29:59</span>
                </div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="bg-white rounded-lg shadow-sm p-4 sm:p-6 lg:p-8 mb-4 sm:mb-8">
            <div class="mb-6">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-4 mb-4">
                    <h3 class="text-lg font-medium text-bbgtk-blue">Question <span id="currentQuestion">3</span>/20</h3>
                    <button id="clearBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded-full text-sm font-medium transition-colors self-start sm:self-auto">
                        Hapus Jawaban
                    </button>
                </div>
                <p class="text-lg sm:text-xl text-gray-900 mb-6 sm:mb-8 leading-relaxed" id="questionText">
                    For Fiscal year 2021, what was your total GhG Carbon Emission for all scopes?
                </p>
            </div>

            <!-- Answer Options -->
            <div class="space-y-3 sm:space-y-4" id="answerOptions">
                <label class="flex items-start space-x-3 p-3 sm:p-4 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="mt-1 h-4 w-4 text-bbgtk-blue border-gray-300 rounded focus:ring-bbgtk-blue flex-shrink-0">
                    <span class="text-gray-700 text-sm sm:text-base leading-relaxed">Scope 1 - Determine environmental impact levels.</span>
                </label>
                <label class="flex items-start space-x-3 p-3 sm:p-4 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="mt-1 h-4 w-4 text-bbgtk-blue border-gray-300 rounded focus:ring-bbgtk-blue flex-shrink-0">
                    <span class="text-gray-700 text-sm sm:text-base leading-relaxed">Scope 2 - Reduce carbon footprints.</span>
                </label>
                <label class="flex items-start space-x-3 p-3 sm:p-4 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="mt-1 h-4 w-4 text-bbgtk-blue border-gray-300 rounded focus:ring-bbgtk-blue flex-shrink-0">
                    <span class="text-gray-700 text-sm sm:text-base leading-relaxed">Scope 3 - Enhance environmental impacts on a larger scale.</span>
                </label>
                <label class="flex items-start space-x-3 p-3 sm:p-4 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="mt-1 h-4 w-4 text-bbgtk-blue border-gray-300 rounded focus:ring-bbgtk-blue flex-shrink-0">
                    <span class="text-gray-700 text-sm sm:text-base leading-relaxed">Scope 4 - I do not know the answer to this question.</span>
                </label>
            </div>
        </div>

        <!-- Navigation -->
        <div class="bg-white rounded-lg shadow-sm p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <!-- Previous Button -->
                <button id="prevBtn" class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 sm:px-8 py-2 rounded-full font-medium transition-colors order-2 sm:order-1">
                    Sebelumnya
                </button>

                <!-- Page Numbers with Arrow Navigation -->
                <div class="flex items-center justify-center gap-2 sm:gap-3 order-1 sm:order-2">
                    <!-- Left Arrow -->
                    <button id="leftArrow" class="p-1 sm:p-2 rounded-full hover:bg-gray-200 transition-colors">
                        <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    
                    <!-- Page Numbers (5 at a time) -->
                    <div class="flex gap-1 sm:gap-2" id="pagination">
                        <!-- Will be populated by JavaScript -->
                    </div>
                    
                    <!-- Right Arrow -->
                    <button id="rightArrow" class="p-1 sm:p-2 rounded-full hover:bg-gray-200 transition-colors">
                        <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>

                <!-- Next Button -->
                <button id="nextBtn" class="bg-bbgtk-blue hover:bg-blue-700 text-white px-6 sm:px-8 py-2 rounded-full font-medium transition-colors order-3">
                    Lanjut
                </button>
            </div>
        </div>
    </main>

    <script>
        // Quiz data
        const quizData = [
    {
        question: "Kemampuan Anda adalah sesuatu yang sangat mendasar yang tidak banyak dapat Anda ubah lagi.",
        options: [
            "Sangat Setuju",
            "Setuju", 
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Tidak peduli seberapapun tingkat kemampuan Anda saat ini, Anda bisa mengubahnya walaupun sedikit.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju", 
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Anda akan selalu dapat mengubah kemampuan Anda.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Anda adalah seseorang yang unik, tidak banyak yang dapat dilakukan untuk mengubahnya.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Anda akan selalu dapat mengubah diri Anda sendiri.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Kemampuan dalam bidang seni dan musik dapat dipelajari oleh siapapun.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Hanya sedikit orang yang benar-benar mahir dalam olahraga, Anda harus membawa bakat itu sejak lahir.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Matematika lebih mudah dipelajari oleh pria atau seseorang yang berada dalam lingkungan yang menyukainya.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Makin keras Anda mengerjakan sesuatu makin mahir Anda dalam hal ini.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Tidak peduli tipe apapun Anda saat ini, Anda akan selalu dapat mengubahnya.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Mencoba sesuatu yang baru akan sangat menyulitkan Anda sehingga Anda ingin menghindarinya.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Sebagian orang baik dan pintar, sebagian lagi tidak. Tidak banyak yang dapat berubah.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Saya sangat menghargai kritik dan saran dari siapapun juga terkait dengan kinerja saya saat ini.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Saya kurang senang bila ada kritik dan saran dari orang lain.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Semua orang yang tanpa cacat-otak atau cacat-lahir memiliki kemampuan yang sama dalam belajar.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Anda bisa mempelajari sesuatu yang baru, tapi Anda tidak bisa mengubah kemampuan Anda.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Anda dapat melakukan sesuatu secara berbeda, tapi sebenarnya Anda tetap tidak dapat mengubah kemampuan Anda.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Semua orang pada dasarnya baik, tapi kadang-kadang membuat keputusan yang salah.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Alasan terpenting mengapa Anda melakukan pekerjaan Anda adalah keinginan untuk mempelajari sesuatu yang baru.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    },
    {
        question: "Orang yang benar-benar cerdas, tidak perlu bekerja keras.",
        options: [
            "Sangat Setuju",
            "Setuju",
            "Tidak Setuju",
            "Sangat Tidak Setuju"
        ]
    }
];

        let currentQuestionIndex = 2; // Starting at question 3 (index 2)
        let answers = {};
        let timeRemaining = 29 * 60 + 59; // 29:59 in seconds
        let currentPageGroup = 0; // 0 = 1-5, 1 = 6-10, 2 = 11-15, 3 = 16-20

        // Timer functionality
        function updateTimer() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeRemaining > 0) {
                timeRemaining--;
            } else {
                alert('Waktu habis!');
            }
        }

        // Update question display
        function updateQuestion() {
            const question = quizData[currentQuestionIndex];
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('answerOptions');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const label = document.createElement('label');
                label.className = 'flex items-start space-x-3 p-3 sm:p-4 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors';
                label.innerHTML = `
                    <input type="radio" name="question_${currentQuestionIndex}" class="mt-1 h-4 w-4 text-bbgtk-blue border-gray-300 focus:ring-bbgtk-blue flex-shrink-0" 
                           data-option="${index}" value="${index}" ${answers[currentQuestionIndex] === index ? 'checked' : ''}>
                    <span class="text-gray-700 text-sm sm:text-base leading-relaxed">${option}</span>
                `;
                optionsContainer.appendChild(label);
            });
        }

        // Update pagination to show current group
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const leftArrow = document.getElementById('leftArrow');
            const rightArrow = document.getElementById('rightArrow');
            
            // Clear existing buttons
            pagination.innerHTML = '';
            
            // Calculate start and end for current group
            const startIndex = currentPageGroup * 5;
            const endIndex = Math.min(startIndex + 5, 20);
            
            // Create buttons for current group
            for (let i = startIndex; i < endIndex; i++) {
                const button = createPaginationButton(i);
                pagination.appendChild(button);
            }
            
            // Update arrow states
            leftArrow.style.opacity = currentPageGroup === 0 ? '0.5' : '1';
            leftArrow.style.pointerEvents = currentPageGroup === 0 ? 'none' : 'auto';
            
            rightArrow.style.opacity = currentPageGroup === 3 ? '0.5' : '1';
            rightArrow.style.pointerEvents = currentPageGroup === 3 ? 'none' : 'auto';
        }

        function createPaginationButton(index) {
            const button = document.createElement('button');
            button.className = 'w-8 h-8 sm:w-10 sm:h-10 rounded-full font-medium transition-colors text-sm sm:text-base';
            button.textContent = index + 1;
            
            // Check if this specific question has been answered
            const isAnswered = answers[index] !== undefined;
            
            if (isAnswered && index !== currentQuestionIndex) {
                button.className += ' bg-green-500 text-white'; // Green for answered
            } else if (index === currentQuestionIndex) {
                button.className += ' bg-bbgtk-blue text-white'; // Blue for current
            } else {
                button.className += ' bg-gray-200 text-gray-700 hover:bg-gray-300'; // Gray for unanswered
            }
            
            button.addEventListener('click', () => {
                currentQuestionIndex = index;
                updateQuestion();
                updatePagination();
            });
            
            return button;
        }

        // Update current page group based on current question
        function updateCurrentPageGroup() {
            currentPageGroup = Math.floor(currentQuestionIndex / 5);
        }

        // Save answers
        function saveAnswers() {
            const radioButton = document.querySelector(`input[name="question_${currentQuestionIndex}"]:checked`);
            if (radioButton) {
                answers[currentQuestionIndex] = parseInt(radioButton.value);
            }
        }

        // Clear current answer
        function clearCurrentAnswer() {
            delete answers[currentQuestionIndex];
            updateQuestion();
            updatePagination();
        }

        // Navigate to previous page group
        function navigateLeft() {
            if (currentPageGroup > 0) {
                currentPageGroup--;
                updatePagination();
            }
        }

        // Navigate to next page group
        function navigateRight() {
            if (currentPageGroup < 3) {
                currentPageGroup++;
                updatePagination();
            }
        }

        // Toggle mobile menu
        function toggleMobileMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            mobileMenu.classList.toggle('hidden');
        }

        // Navigation event listeners
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                saveAnswers();
                currentQuestionIndex--;
                updateCurrentPageGroup();
                updateQuestion();
                updatePagination();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentQuestionIndex < 19) {
                saveAnswers();
                currentQuestionIndex++;
                updateCurrentPageGroup();
                updateQuestion();
                updatePagination();
            } else {
                saveAnswers();
                showResults();
            }
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            if (confirm('Apakah Anda yakin ingin kembali? Progress akan tersimpan.')) {
                window.history.back();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Apakah Anda yakin ingin menghapus jawaban untuk soal ini?')) {
                clearCurrentAnswer();
            }
        });

        document.getElementById('leftArrow').addEventListener('click', navigateLeft);
        document.getElementById('rightArrow').addEventListener('click', navigateRight);
        document.getElementById('mobileMenuBtn').addEventListener('click', toggleMobileMenu);

        // Save answers when radio buttons change
        document.addEventListener('change', (e) => {
            if (e.target.type === 'radio' && e.target.closest('#answerOptions')) {
                saveAnswers();
                updatePagination(); // Update pagination to show green for answered questions
            }
        });

        function calculateScore() {
            let totalScore = 0;
            for (let i = 0; i < 20; i++) {
                if (answers[i] !== undefined) {
                    totalScore += answers[i]; // 0=Sangat Setuju, 1=Setuju, 2=Tidak Setuju, 3=Sangat Tidak Setuju
                }
            }
            return totalScore;
        }

        function getMindsetProfile(score) {
            if (score >= 0 && score <= 20) {
                return {
                    code: "FF",
                    name: "Pola Pikir Tetap (Fixed Mindset)",
                    description: "Anda cenderung percaya bahwa kemampuan adalah tetap dan tidak dapat diubah."
                };
            } else if (score >= 21 && score <= 33) {
                return {
                    code: "FG", 
                    name: "Pola Pikir Tetap dengan sedikit Pola Pikir Berkembang",
                    description: "Anda memiliki kecenderungan pola pikir tetap namun mulai terbuka pada perkembangan."
                };
            } else if (score >= 34 && score <= 44) {
                return {
                    code: "GF",
                    name: "Pola Pikir Berkembang dengan sedikit Pola Pikir Tetap", 
                    description: "Anda cenderung memiliki pola pikir berkembang namun masih ada sedikit pola pikir tetap."
                };
            } else if (score >= 45 && score <= 60) {
                return {
                    code: "GG",
                    name: "Pola Pikir Berkembang (Growth Mindset)",
                    description: "Anda memiliki pola pikir berkembang yang kuat dan percaya kemampuan dapat ditingkatkan."
                };
            }
        }

        function showResults() {
            const score = calculateScore();
            const profile = getMindsetProfile(score);
            
            alert(`Hasil Kuesioner Anda:
            
Skor Total: ${score}/60
Profil: ${profile.name} (${profile.code})

${profile.description}

Terima kasih telah mengikuti kuesioner!`);
        }

        // Initialize
        updateTimer();
        updateCurrentPageGroup();
        updateQuestion();
        updatePagination();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
