<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBGTK Sumatera Utara - Sign In</title>

    <!-- Icon Website -->
    <link rel="shortcut icon" href="./img/ikon-tutwurihan.png" type="image/x-icon">

    <!-- Link CSS -->
    <link rel="stylesheet" href="./styles/output.css">

    <style>
        /* Custom styles untuk font dan animasi */
        .fade-in {
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>
<body class="fade-in min-h-screen font-poppins relative">
    <!-- Split Background -->
    <div class="absolute inset-0 flex">
        <!-- Left Orange Background -->
        <div class="w-1/2 bg-[#ffb900]"></div>
        <!-- Right White Background -->
        <div class="w-1/2 bg-white"></div>      
    </div>

    <!-- Logo Area (Top Left) -->
    <div class="absolute top-8 left-8 w-60 h-10 bg-white/10 rounded-lg flex items-center justify-center z-10">
        <!-- Logo BBGTK akan ditambahkan di sini -->
        <img src="./img/logo-bbgtk.png" alt="Logo BBGTK" class="w-full h-full object-contain">
    </div>

    <!-- Centered Login Box -->
    <div class="relative z-20 min-h-screen flex items-center justify-center p-8">
        <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-lg">
            <!-- Header -->
            <div class="text-center mb-8">
                <p class="text-gray-600 text-lg mb-2 font-medium">Selamat datang</p>
                <h1 class="text-3xl font-bold text-gray-900">Sign in</h1>
            </div>

            <!-- Login Form -->
            <form class="space-y-6">
                <!-- Username/Email Field -->
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2">
                        Masukkan NIK Anda
                    </label>
                    <input 
                        type="text" 
                        placeholder="Username or email address"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1565C0] focus:border-transparent outline-none transition-all"
                    >
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2">
                        Masukkan password Anda
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password"
                            placeholder="Password"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1565C0] focus:border-transparent outline-none transition-all pr-12"
                        >
                        <button 
                            type="button"
                            onclick="togglePassword()"
                            class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600"
                        >
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="text-right mt-2">
                        <a href="#" class="text-[#1565C0] text-sm hover:underline">Lupa password</a>
                    </div>
                </div>

                <!-- Sign In Button -->
                <button type="submit"class="w-full bg-[#1565C0] py-3 rounded-lg hover:bg-blue-700 transition-colors">
                    <a href="./index.html" class="text-white font-medium">Sign in</a>
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        }
    </script>
</body>
</html>
